[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200

[profile.default.fuzz]
runs = 1000
seed = "0xdeadbeef"

[profile.default.invariant]
runs = 200
depth = 15
fail_on_revert = false

[rpc_endpoints]
fuji = "${FUJI_RPC_URL}"
avalanche = "${AVAX_RPC_URL}"

[etherscan]
fuji = { key = "${SNOWTRACE_API_KEY}", url = "https://api.routescan.io/v2/network/testnet/evm/43113/etherscan" }
